<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles Box - Apple Music Style</title>
<style>
  :root {
    --apple-text: #1d1d1f;
    --apple-text-muted: #515154;
    --apple-blue: #0071e3;
    --border-radius-card: 24px;
    
    /* Couleurs Glassmorphism */
    --glass-bg: rgba(255, 255, 255, 0.4);
    --glass-border: rgba(255, 255, 255, 0.5);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    color: var(--apple-text);
    /* La police native d'Apple (San Francisco) */
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    padding-bottom: 80px;
    background-color: #f2f2f7;
  }

  /* --- MESH GRADIENT (Style Apple Music / Siri) --- */
  .mesh-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: -1;
    overflow: hidden;
    background-color: #fdfcff;
  }

  .mesh-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.7;
    animation: moveBlobs 25s infinite alternate ease-in-out;
  }

  .blob-1 { background: #ff2a5f; width: 50vw; height: 50vw; top: -10%; left: -10%; }
  .blob-2 { background: #0071e3; width: 60vw; height: 60vw; bottom: -20%; right: -10%; animation-delay: -5s; }
  .blob-3 { background: #bf5af2; width: 45vw; height: 45vw; top: 40%; left: 30%; animation-delay: -10s; }
  .blob-4 { background: #ff9500; width: 40vw; height: 40vw; top: 10%; right: 10%; animation-delay: -15s; }

  @keyframes moveBlobs {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(5vw, -5vh) scale(1.1); }
    66% { transform: translate(-5vw, 5vh) scale(0.9); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* --- NAVIGATION TOP EN VERRE --- */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: saturate(200%) blur(30px);
    -webkit-backdrop-filter: saturate(200%) blur(30px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    display: flex;
    justify-content: center;
    padding: 12px 20px;
  }

  .nav-container {
    width: 100%;
    max-width: 980px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  /* --- RECHERCHE --- */
  .search-wrapper {
    position: relative;
    flex: 1;
    max-width: 400px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--apple-text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 14px;
    color: var(--apple-text);
    font-size: 17px;
    padding: 10px 16px 10px 36px;
    outline: none;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
  }

  .search-input::placeholder { color: var(--apple-text-muted); }
  .search-input:focus { 
    background: rgba(255, 255, 255, 0.8); 
    box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.3); 
  }

  /* --- CONTRÔLES DROITE --- */
  .controls-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Bouton Aléatoire (Bleu) */
  .random-btn {
    background: rgba(0, 113, 227, 0.1);
    color: var(--apple-blue);
    border: 1px solid rgba(0, 113, 227, 0.3);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .random-btn:hover {
    background: var(--apple-blue);
    color: white;
    border-color: var(--apple-blue);
    box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
  }
  .random-btn:active { transform: scale(0.96); }

  /* Bouton d'action principal en verre rouge */
  .stop-btn {
    background: rgba(255, 59, 48, 0.1);
    color: #ff3b30;
    border: 1px solid rgba(255, 59, 48, 0.3);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stop-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .stop-btn:hover { 
    background: #ff3b30; 
    color: white; 
    border-color: #ff3b30;
    box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
  }
  .stop-btn:active { transform: scale(0.96); }

  /* --- HERO SECTION --- */
  header.hero {
    text-align: center;
    padding: 80px 20px 60px;
    max-width: 980px;
    margin: 0 auto;
  }

  h1 {
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--apple-text);
    margin-bottom: 12px;
    /* Effet de texte translucide pour laisser passer les couleurs */
    background: rgba(0, 0, 0, 0.85);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: clamp(20px, 4vw, 28px);
    color: rgba(29, 29, 31, 0.7);
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  /* --- GRILLE --- */
  main {
    max-width: 1020px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 24px;
  }

  /* --- CARTES PRODUIT APPLE EN VERRE --- */
  .sound-card {
    background: var(--glass-bg);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 1px solid var(--glass-border);
    border-radius: var(--border-radius-card);
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    box-shadow: var(--glass-shadow);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  /* Reflet lumineux subtil sur la carte */
  .sound-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
    border-radius: inherit;
    pointer-events: none;
  }

  .sound-card:hover {
    transform: scale(1.02) translateY(-4px);
    background: rgba(255, 255, 255, 0.6);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
  }

  .sound-card:active {
    transform: scale(0.98);
  }

  .card-eyebrow {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--apple-text-muted);
    margin-bottom: 8px;
    z-index: 2;
  }

  .label {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--apple-text);
    line-height: 1.1;
    z-index: 2;
    max-width: 100%;
  }

  .emoji {
    font-size: 80px;
    position: absolute;
    bottom: 15px;
    right: 15px;
    z-index: 1;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
  }

  .sound-card:hover .emoji {
    transform: scale(1.1) rotate(-5deg);
  }

  /* --- BOUTON FAVORIS --- */
  .fav-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 10;
    color: rgba(0, 0, 0, 0.2); /* Gris très clair pour l'état inactif */
    transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.2s ease;
    /* On évite que le clic sur le coeur déclenche l'animation de la carte entière */
    transform-origin: center;
    padding: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fav-btn:hover {
    transform: scale(1.15);
    color: rgba(0, 0, 0, 0.5);
  }

  .fav-btn.is-favorite {
    color: #4a4a4a; /* Gris foncé pour l'état actif */
    transform: scale(1.05);
  }
  
  .fav-btn.is-favorite:hover {
    transform: scale(1.15);
    color: #1d1d1f; /* Encore plus foncé au survol */
  }

  /* Barre de progression avec dégradé vibrant */
  .progress-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    background: transparent;
    z-index: 3;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff2a5f, #bf5af2, #0071e3);
    transition: width 0.1s linear;
  }

  /* État ACTIF */
  .sound-card.is-playing {
    background: rgba(255, 255, 255, 0.85);
    border-color: rgba(255, 255, 255, 1);
  }
  
  .sound-card.is-playing .emoji {
    transform: scale(1.1) translateY(-10px);
  }

  @media (max-width: 600px) {
    .nav-container { flex-direction: column; gap: 15px; }
    .search-wrapper { width: 100%; max-width: 100%; }
    .controls-right { width: 100%; justify-content: center; }
    header.hero { padding: 40px 20px 30px; }
  }

</style>
</head>
<body>

  <!-- Mesh Gradient Background -->
  <div class="mesh-bg">
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
    <div class="mesh-blob blob-4"></div>
  </div>

  <nav>
    <div class="nav-container">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Rechercher...">
      </div>
      
      <div class="controls-right">
        <button id="randomBtn" class="random-btn">
          <span>🔀 Aléatoire</span>
        </button>
        <button id="stopBtn" class="stop-btn">
          <span>⏹️ Arrêter</span>
        </button>
      </div>
    </div>
  </nav>

  <header class="hero">
    <h1>Charles Box</h1>
    <p class="subtitle">Vos sons favoris.</p>
  </header>

  <main>
    <div class="grid" id="grid">
      <!-- Les cartes sont générées par JS -->
    </div>
  </main>

  <script>
    /* ======================================================
      TES SONS (Hébergés sur ton GitHub)
      Crée un dossier "audio" à côté de ton index.html 
      et mets tes fichiers audio dedans.
      ====================================================== */
    const SOUNDS = [
      { name: "Angeeee Oceee", emoji: "👯‍♀️", data: "audio/Angeeee Oceee.wav" },
      { name: "Bébé", emoji: "👶", data: "audio/Bébé.wav" },
      { name: "Andréa", emoji: "👩‍🦰", data: "audio/Andréa.wav" },
      { name: "Au revoir, Merci !", emoji: "👋", data: "audio/Au revoir, Merci !.wav" },
      { name: "Du Coca…", emoji: "🥤", data: "audio/Du Coca....wav" },
      { name: "La maudddddd", emoji: "👱‍♀️", data: "audio/La maudddddd.wav" },
      { name: "Miskina elle a pas d'argent", emoji: "💸", data: "audio/Miskina elle a pas d'argent.wav" },
      { name: "Miskina", emoji: "😤", data: "audio/Miskina.wav" },
      { name: "On va fumeyy", emoji: "🚬", data: "audio/On va fumeyy.wav" },
      { name: "On va se faire du souci", emoji: "😟", data: "audio/On va se faire du souci.wav" },
      { name: "Gratin", emoji: "🥔", data: "audio/Gratin.wav" },
      { name: "Un sac à 15ct", emoji: "🛍️", data: "audio/Un sac à 15ct.wav" },
      { name: "Nabilla", emoji: "💅", data: "audio/Nabilla.wav" }
    ];

    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('searchInput');
    const stopBtn = document.getElementById('stopBtn');
    const randomBtn = document.getElementById('randomBtn');

    let currentAudio = null;
    let currentProgressBar = null;
    let currentCard = null;
    let animationFrameId = null;
    
    // Système de favoris (en mémoire pour la session)
    let favorites = new Set();

    function stopCurrentSound() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      if (currentProgressBar) currentProgressBar.style.width = '0%';
      if (currentCard) currentCard.classList.remove('is-playing');
      
      cancelAnimationFrame(animationFrameId);
      stopBtn.classList.remove('visible');
    }

    function updateProgress() {
      if (!currentAudio || !currentProgressBar) return;
      const percentage = (currentAudio.currentTime / currentAudio.duration) * 100;
      currentProgressBar.style.width = `${percentage || 0}%`;

      if (currentAudio.currentTime < currentAudio.duration && !currentAudio.paused) {
        animationFrameId = requestAnimationFrame(updateProgress);
      }
    }

    function playSound(soundData, cardElement, progressElement) {
      stopCurrentSound();

      currentAudio = new Audio(soundData);
      
      currentProgressBar = progressElement;
      currentCard = cardElement;

      cardElement.classList.add('is-playing');
      stopBtn.classList.add('visible');

      currentAudio.play().catch(e => console.log("Erreur de lecture :", e));
      animationFrameId = requestAnimationFrame(updateProgress);

      currentAudio.addEventListener('ended', stopCurrentSound);
    }

    function renderSounds(filter = '') {
      grid.innerHTML = '';
      const filterLower = filter.toLowerCase();
      
      // Filtrer puis trier : les favoris apparaissent en premier
      const filteredSounds = SOUNDS.filter(sound => 
        sound.name.toLowerCase().includes(filterLower)
      ).sort((a, b) => {
        const aFav = favorites.has(a.name);
        const bFav = favorites.has(b.name);
        if (aFav && !bFav) return -1;
        if (!aFav && bFav) return 1;
        return 0;
      });

      filteredSounds.forEach((sound) => {
        const card = document.createElement('div');
        card.className = 'sound-card';
        
        const isFav = favorites.has(sound.name);

        card.innerHTML = `
          <button class="fav-btn ${isFav ? 'is-favorite' : ''}" title="Ajouter aux favoris">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </button>
          <span class="card-eyebrow">Audio</span>
          <h2 class="label">${sound.name}</h2>
          <span class="emoji">${sound.emoji}</span>
          <div class="progress-wrap">
            <div class="progress-bar"></div>
          </div>
        `;

        const progressBar = card.querySelector('.progress-bar');
        const favBtn = card.querySelector('.fav-btn');

        // Gestion du clic sur le coeur (sans lancer le son)
        favBtn.addEventListener('click', (e) => {
          e.stopPropagation(); // Empêche le clic de se propager à la carte
          if (favorites.has(sound.name)) {
            favorites.delete(sound.name);
          } else {
            favorites.add(sound.name);
          }
          // On recharge l'affichage pour mettre à jour le tri
          renderSounds(searchInput.value);
        });

        // Lancement du son au clic sur la carte
        card.addEventListener('click', () => {
          playSound(sound.data, card, progressBar);
        });

        grid.appendChild(card);
      });
    }

    /* --- LISTENERS --- */
    searchInput.addEventListener('input', (e) => renderSounds(e.target.value));
    
    stopBtn.addEventListener('click', stopCurrentSound);
    
    // Bouton Aléatoire
    randomBtn.addEventListener('click', () => {
      // Sélectionne toutes les cartes actuellement affichées
      const cards = grid.querySelectorAll('.sound-card');
      if (cards.length > 0) {
        // Choisit une carte au hasard
        const randomCard = cards[Math.floor(Math.random() * cards.length)];
        // Simule un clic sur cette carte
        randomCard.click();
      }
    });

    // Raccourci clavier : Barre Espace pour arrêter le son
    document.addEventListener('keydown', (e) => {
      // On vérifie que la touche est Espace et qu'on n'est pas en train d'écrire dans la recherche
      if (e.code === 'Space' && e.target !== searchInput) {
        e.preventDefault(); // Empêche la page de défiler vers le bas
        stopCurrentSound();
      }
    });

    // Initialisation
    renderSounds();
  </script>
</body>
</html>
