<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Charles Box - Apple Music Style</title>

<!-- LOGO OFFICIEL (Favicon & Apple Icon) -->
<link rel="icon" type="image/jpeg" href="Charlesicon.jpg">
<link rel="apple-touch-icon" href="Charlesicon.jpg">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

<style>
  :root {
    --apple-text: #1d1d1f;
    --apple-text-muted: #515154;
    --apple-blue: #0071e3;
    --border-radius-card: 24px;
    --glass-bg: rgba(255, 255, 255, 0.4);
    --glass-border: rgba(255, 255, 255, 0.5);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    color: var(--apple-text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: 80px;
    background-color: #f2f2f7;
    overflow-x: hidden;
  }

  /* --- MESH GRADIENT --- */
  .mesh-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: -1;
    overflow: hidden;
    background-color: #fdfcff;
  }
  .mesh-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.7;
    animation: moveBlobs 25s infinite alternate ease-in-out;
  }
  .blob-1 { background: #ff2a5f; width: 50vw; height: 50vw; top: -10%; left: -10%; }
  .blob-2 { background: #0071e3; width: 60vw; height: 60vw; bottom: -20%; right: -10%; }
  .blob-3 { background: #bf5af2; width: 45vw; height: 45vw; top: 40%; left: 30%; }
  .blob-4 { background: #ff9500; width: 40vw; height: 40vw; top: 10%; right: 10%; }

  @keyframes moveBlobs {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(5vw, 5vh) scale(1.1); }
  }

  /* --- NAVIGATION --- */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: saturate(200%) blur(30px);
    -webkit-backdrop-filter: saturate(200%) blur(30px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    display: flex;
    justify-content: center;
    padding: 12px 20px;
  }
  .nav-container {
    width: 100%;
    max-width: 980px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .search-wrapper { position: relative; flex: 1; max-width: 400px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--apple-text-muted); font-size: 14px; }
  .search-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 14px;
    color: var(--apple-text);
    font-size: 17px;
    padding: 10px 16px 10px 36px;
    outline: none;
    transition: background 0.2s;
  }
  .search-input:focus { background: rgba(255, 255, 255, 0.8); }

  .controls-right { display: flex; align-items: center; gap: 12px; }
  .random-btn, .stop-btn {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    gap: 6px; border: 1px solid transparent;
  }
  .random-btn { background: rgba(0, 113, 227, 0.1); color: var(--apple-blue); border-color: rgba(0, 113, 227, 0.3); }
  .stop-btn { background: rgba(255, 59, 48, 0.1); color: #ff3b30; border-color: rgba(255, 59, 48, 0.3); opacity: 0; pointer-events: none; }
  .stop-btn.visible { opacity: 1; pointer-events: auto; }

  /* --- HEADER --- */
  header.hero { text-align: center; padding: 60px 20px 40px; max-width: 980px; margin: 0 auto; }
  h1 { font-size: clamp(40px, 8vw, 80px); font-weight: 700; background: rgba(0, 0, 0, 0.85); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: clamp(18px, 4vw, 24px); color: rgba(29, 29, 31, 0.7); }

  /* --- GRILLE --- */
  main { max-width: 1020px; margin: 0 auto; padding: 0 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }

  /* --- CARTES --- */
  .sound-card {
    background: var(--glass-bg);
    backdrop-filter: blur(40px) saturate(200%);
    border: 1px solid var(--glass-border);
    border-radius: var(--border-radius-card);
    padding: 24px;
    display: flex; flex-direction: column; align-items: flex-start;
    cursor: pointer; position: relative; overflow: hidden; aspect-ratio: 1 / 1;
    box-shadow: var(--glass-shadow);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s ease;
  }
  .sound-card:hover { transform: scale(1.02) translateY(-4px); background: rgba(255, 255, 255, 0.6); }

  .card-eyebrow { font-size: 13px; font-weight: 600; text-transform: uppercase; color: var(--apple-text-muted); margin-bottom: 8px; z-index: 2; }
  .label { font-size: 22px; font-weight: 700; color: var(--apple-text); z-index: 2; }
  .emoji { font-size: 80px; position: absolute; bottom: 15px; right: 15px; transition: transform 0.4s ease; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15)); z-index: 1; }
  .sound-card:hover .emoji { transform: scale(1.1) rotate(-5deg); }

  .fav-btn {
    position: absolute; top: 15px; right: 15px; background: none; border: none; cursor: pointer; z-index: 10;
    color: rgba(0, 0, 0, 0.15); transition: color 0.2s ease;
  }
  .fav-btn.is-favorite { color: #4a4a4a; }

  .progress-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 5px; z-index: 3; }
  .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff2a5f, #bf5af2, #0071e3); }
  .sound-card.is-playing { background: rgba(255, 255, 255, 0.85); }

  @media (max-width: 600px) {
    .nav-container { flex-direction: column; gap: 12px; }
    .controls-right { width: 100%; gap: 10px; }
    .random-btn, .stop-btn { flex: 1; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .label { font-size: 15px; }
    .emoji { font-size: 55px; }
  }
</style>
</head>
<body>
  <div class="mesh-bg">
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
    <div class="mesh-blob blob-4"></div>
  </div>

  <nav>
    <div class="nav-container">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Rechercher...">
      </div>
      <div class="controls-right">
        <button id="randomBtn" class="random-btn"><span>🔀 Aléatoire</span></button>
        <button id="stopBtn" class="stop-btn"><span>⏹️ Arrêter</span></button>
      </div>
    </div>
  </nav>

  <header class="hero">
    <h1>Charles Box</h1>
    <p class="subtitle">Vos sons favoris.</p>
  </header>

  <main><div class="grid" id="grid"></div></main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const SOUNDS = [
      { name: "Angeeee Oceee", emoji: "👯‍♀️", data: "audio/ange.wav" },
      { name: "Bébé", emoji: "👶", data: "audio/bebe.wav" },
      { name: "Andréa", emoji: "👩‍🦰", data: "audio/andrea.wav" },
      { name: "Au revoir, Merci !", emoji: "👋", data: "audio/merci.wav" },
      { name: "Du Coca…", emoji: "🥤", data: "audio/coca.wav" },
      { name: "La maudddddd", emoji: "👱‍♀️", data: "audio/maud.wav" },
      { name: "Miskina elle a pas d'argent", emoji: "💸", data: "audio/miskina2.wav" },
      { name: "Miskina", emoji: "😤", data: "audio/miskina.wav" },
      { name: "On va fumeyy", emoji: "🚬", data: "audio/fumeyy.wav" },
      { name: "On va se faire du souci", emoji: "😟", data: "audio/souci.wav" },
      { name: "Gratin", emoji: "🥔", data: "audio/gratin.wav" },
      { name: "Un sac à 15ct", emoji: "🛍️", data: "audio/sac.wav" },
      { name: "Nabilla", emoji: "💅", data: "audio/nabilla.wav" }
    ];

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'charles-box-app';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    
    let db, auth, user, favorites = new Set();
    const grid = document.getElementById('grid'), searchInput = document.getElementById('searchInput'), stopBtn = document.getElementById('stopBtn'), randomBtn = document.getElementById('randomBtn');
    let currentAudio = null, currentProgressBar = null, currentCard = null, animationFrameId = null;

    async function initFirebase() {
      if (!firebaseConfig.apiKey) { renderSounds(); return; }
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app); db = getFirestore(app);
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
      else await signInAnonymously(auth);
      onAuthStateChanged(auth, u => { user = u; if (user) loadFavorites(); else renderSounds(); });
    }

    function loadFavorites() {
      const favDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'favorites');
      onSnapshot(favDocRef, snap => {
        favorites = new Set(snap.exists() ? snap.data().list : []);
        renderSounds(searchInput.value);
      });
    }

    async function toggleFavorite(name) {
      if (favorites.has(name)) favorites.delete(name); else favorites.add(name);
      renderSounds(searchInput.value);
      if (user) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'favorites'), { list: Array.from(favorites) }, { merge: true });
    }

    function stopCurrentSound() {
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
      if (currentProgressBar) currentProgressBar.style.width = '0%';
      if (currentCard) currentCard.classList.remove('is-playing');
      cancelAnimationFrame(animationFrameId); stopBtn.classList.remove('visible');
    }

    function updateProgress() {
      if (!currentAudio || !currentProgressBar) return;
      currentProgressBar.style.width = `${(currentAudio.currentTime / currentAudio.duration) * 100}%`;
      if (!currentAudio.paused) animationFrameId = requestAnimationFrame(updateProgress);
    }

    function playSound(soundData, card, progress) {
      stopCurrentSound();
      currentAudio = new Audio(soundData); currentProgressBar = progress; currentCard = card;
      card.classList.add('is-playing'); stopBtn.classList.add('visible');
      currentAudio.play().catch(e => console.error(e));
      animationFrameId = requestAnimationFrame(updateProgress);
      currentAudio.onended = stopCurrentSound;
    }

    function renderSounds(filter = '') {
      grid.innerHTML = '';
      const filterLower = filter.toLowerCase();
      const filtered = SOUNDS.filter(s => s.name.toLowerCase().includes(filterLower))
        .sort((a, b) => (favorites.has(b.name) - favorites.has(a.name)));

      filtered.forEach(sound => {
        const card = document.createElement('div');
        card.className = 'sound-card';
        const isFav = favorites.has(sound.name);
        card.innerHTML = `
          <button class="fav-btn ${isFav ? 'is-favorite' : ''}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </button>
          <span class="card-eyebrow">Audio</span>
          <h2 class="label">${sound.name}</h2>
          <span class="emoji">${sound.emoji}</span>
          <div class="progress-wrap"><div class="progress-bar"></div></div>
        `;
        card.querySelector('.fav-btn').onclick = e => { e.stopPropagation(); toggleFavorite(sound.name); };
        card.onclick = () => playSound(sound.data, card, card.querySelector('.progress-bar'));
        grid.appendChild(card);
      });
    }

    searchInput.oninput = e => renderSounds(e.target.value);
    stopBtn.onclick = stopCurrentSound;
    randomBtn.onclick = () => { const cards = grid.querySelectorAll('.sound-card'); if (cards.length) cards[Math.floor(Math.random() * cards.length)].click(); };
    document.onkeydown = e => { if (e.code === 'Space' && e.target !== searchInput) { e.preventDefault(); stopCurrentSound(); } };
    initFirebase();
  </script>
</body>
</html>
